name: Typecheck Diagnostic

on:
  pull_request:
    branches: [main]

jobs:
  capture-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Capture typecheck output
        id: capture
        shell: bash
        run: |
          set +e
          pnpm typecheck > typecheck.log 2>&1
          code=$?
          cat typecheck.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostic
          path: typecheck.log
          if-no-files-found: error
      - name: Preserve typecheck result
        shell: bash
        run: exit "${{ steps.capture.outputs.exit_code }}"
